# Разворачивается на VM 212.147.238.3 в ~deploy/kaifograd.
# Образ приезжает из GHCR (публичный пакет), CI делает docker compose pull + up -d.
name: kaifograd

networks:
  # Внешняя сеть kate-stack: Alloy собирает логи контейнеров из неё.
  kate-stack_obs:
    external: true

volumes:
  kaifograd-data:

services:
  kaifograd:
    image: ghcr.io/ekaterinaglowme/kaifograd:latest
    mem_limit: 256m
    cpus: 0.5
    ports:
      - "0.0.0.0:4173:4173"
    environment:
      PORT: 4173
      HOST_CODE: ${HOST_CODE:-0306}
      TEAMS: ${TEAMS:-6}
      STATE_FILE: /data/game-state.json
    volumes:
      - kaifograd-data:/data
    networks: [kate-stack_obs]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Логи kaifograd на отдельном порту :9099 как text/plain. На каждое подключение
  # отдаёт последние 200 строк логов контейнера приложения. Клиентский ввод не
  # используется — на сокете всегда одна фиксированная команда, инъекции через
  # порт нет. docker.sock смонтирован ro.
  logs:
    image: docker:27-cli
    mem_limit: 64m
    cpus: 0.1
    # nc -e запускает обработчик на КАЖДОЕ подключение, поэтому docker logs снимается
    # в момент запроса (никакого отставания), а -lk держит сервер персистентным.
    entrypoint: ["sh", "-c"]
    command:
      - |
        cat > /tmp/serve <<'EOF'
        #!/bin/sh
        printf 'HTTP/1.1 200 OK\r\nContent-Type: text/plain; charset=utf-8\r\nConnection: close\r\n\r\n'
        docker logs --tail 200 kaifograd-kaifograd-1 2>&1
        EOF
        chmod +x /tmp/serve
        exec nc -lk -p 8080 -e /tmp/serve
    ports:
      # Не рядом с игровым 4173, чтобы случайно не дать командам ссылку на логи.
      - "0.0.0.0:9099:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [kate-stack_obs]
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
